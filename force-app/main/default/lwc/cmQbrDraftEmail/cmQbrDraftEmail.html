<template>
    <div class="slds-p-around_medium">
        <div class="slds-box slds-theme_default slds-m-bottom_medium">
            <div><strong>{outputModeLabel}:</strong> {outputModeSummary}</div>
            <div class="slds-m-top_x-small"><strong>{toSummaryLabel}:</strong> {primaryRecipientSummary}</div>
            <div class="slds-m-top_x-small"><strong>{ccSummaryLabel}:</strong> {ccRecipientSummary}</div>
            <template if:true={showReviewFlagsSummary}>
                <div class="slds-m-top_x-small"><strong>{reviewFlagsLabel}:</strong> {coverageSummary}</div>
            </template>
        </div>

        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">{sectionDescription}</p>

        <template if:true={isDraftLoading}>
            <div class="slds-box slds-theme_alert-texture slds-m-bottom_medium">
                <lightning-spinner size="small" alternative-text="Loading"></lightning-spinner>
                <div class="slds-m-top_x-small slds-text-body_small">{draftStatusText}</div>
            </div>
        </template>

        <div class="recipient-composer">
            <div class="recipient-row">
                <div class="recipient-row__label">
                    <abbr class="slds-required" title="required">*</abbr>{toFieldLabel}
                </div>
                <div class="recipient-row__field">
                    <lightning-input
                        type="search"
                        label={toFieldLabel}
                        variant="label-hidden"
                        placeholder={searchPlaceholder}
                        value={toSearchTerm}
                        data-list="to"
                        onchange={handleRecipientSearchChange}>
                    </lightning-input>

                    <template if:true={hasToRecipients}>
                        <div class="slds-m-top_x-small">
                            <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">{addedRecipientsLabel}</div>
                            <div class="recipient-pill-container">
                                <template for:each={toRecipientPills} for:item="pill">
                                    <lightning-pill
                                        key={pill.name}
                                        name={pill.name}
                                        label={pill.label}
                                        onremove={handleToRecipientRemove}>
                                    </lightning-pill>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template if:true={showToSuggestionPanel}>
                        <div class="recipient-lookup slds-m-top_x-small">
                            <div class="slds-text-body_small slds-text-color_weak recipient-lookup__title">{suggestionTitle}</div>
                            <template if:true={hasToMatches}>
                                <template for:each={toFilteredOptions} for:item="option">
                                    <button
                                        key={option.value}
                                        type="button"
                                        class="recipient-option-button"
                                        data-list="to"
                                        data-recipient-id={option.value}
                                        onclick={handleRecipientSelect}>
                                        <lightning-icon
                                            icon-name={option.iconName}
                                            size="small"
                                            class="recipient-option__icon">
                                        </lightning-icon>
                                        <span class="recipient-option__content">
                                            <span class="recipient-option__primary">{option.primaryText}</span>
                                            <template if:true={option.secondaryText}>
                                                <span class="recipient-option__secondary">{option.secondaryText}</span>
                                            </template>
                                            <template if:true={option.supportingText}>
                                                <span class="recipient-option__supporting">{option.supportingText}</span>
                                            </template>
                                        </span>
                                    </button>
                                </template>
                            </template>
                            <template if:false={hasToMatches}>
                                <div class="slds-text-body_small slds-text-color_weak">{noMatchesText}</div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <div class="recipient-row slds-m-top_medium">
                <div class="recipient-row__label">{ccFieldLabel}</div>
                <div class="recipient-row__field">
                    <lightning-input
                        type="search"
                        label={ccFieldLabel}
                        variant="label-hidden"
                        placeholder={searchPlaceholder}
                        value={ccSearchTerm}
                        data-list="cc"
                        onchange={handleRecipientSearchChange}>
                    </lightning-input>

                    <template if:true={hasCcRecipients}>
                        <div class="slds-m-top_x-small">
                            <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">{addedRecipientsLabel}</div>
                            <div class="recipient-pill-container">
                                <template for:each={ccRecipientPills} for:item="pill">
                                    <lightning-pill
                                        key={pill.name}
                                        name={pill.name}
                                        label={pill.label}
                                        onremove={handleCcRecipientRemove}>
                                    </lightning-pill>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template if:true={showCcSuggestionPanel}>
                        <div class="recipient-lookup slds-m-top_x-small">
                            <div class="slds-text-body_small slds-text-color_weak recipient-lookup__title">{suggestionTitle}</div>
                            <template if:true={hasCcMatches}>
                                <template for:each={ccFilteredOptions} for:item="option">
                                    <button
                                        key={option.value}
                                        type="button"
                                        class="recipient-option-button"
                                        data-list="cc"
                                        data-recipient-id={option.value}
                                        onclick={handleRecipientSelect}>
                                        <lightning-icon
                                            icon-name={option.iconName}
                                            size="small"
                                            class="recipient-option__icon">
                                        </lightning-icon>
                                        <span class="recipient-option__content">
                                            <span class="recipient-option__primary">{option.primaryText}</span>
                                            <template if:true={option.secondaryText}>
                                                <span class="recipient-option__secondary">{option.secondaryText}</span>
                                            </template>
                                            <template if:true={option.supportingText}>
                                                <span class="recipient-option__supporting">{option.supportingText}</span>
                                            </template>
                                        </span>
                                    </button>
                                </template>
                            </template>
                            <template if:false={hasCcMatches}>
                                <div class="slds-text-body_small slds-text-color_weak">{noMatchesText}</div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <lightning-input
            class="slds-m-top_medium"
            name="subject"
            label={emailSubjectLabel}
            value={editedEmailSubject}
            required
            onchange={handleSubjectChange}>
        </lightning-input>

        <lightning-input-rich-text
            class="slds-m-top_medium email-body-editor"
            label={emailBodyLabel}
            value={editedEmailBody}
            required
            onchange={handleBodyChange}>
        </lightning-input-rich-text>

        <div class="slds-m-top_medium slds-grid slds-grid_align-end">
            <lightning-button
                variant="brand"
                label={sendButtonLabel}
                onclick={handleSendClick}
                disabled={isSendDisabled}>
            </lightning-button>
        </div>

        <template if:true={sendStatusMessage}>
            <div class={statusClassName}>{sendStatusMessage}</div>
        </template>
    </div>
</template>
