<template>
    <div class="slds-p-around_medium">
        <template if:true={isSetupMode}>
            <p class="step-title">{setupTitle}</p>
            <p class="helper-text">{setupHint}</p>

            <lightning-combobox
                name="quarter"
                label={quarterLabel}
                value={quarter}
                options={quarterOptions}
                required
                onchange={handleQuarterChange}
            ></lightning-combobox>

            <lightning-input
                class="slds-m-top_medium"
                type="date"
                name="meetingDate"
                label={meetingDateLabel}
                value={meetingDate}
                required
                onchange={handleDateChange}
            ></lightning-input>

        </template>

        <template if:true={isEditorMode}>
            <template if:true={hasUnsavedChanges}>
                <div class="unsaved-warning slds-m-bottom_small">
                    <p class="error-message">{unsavedWarningMessage}</p>
                </div>
            </template>
            <section class="editor-box editor-tabs-box">
                <p class="step-title">{editorTopicsTitle}</p>
                <p class="helper-text slds-m-top_x-small">{editorTopicsHint}</p>
                <div class="table-box topic-list-box slds-m-top_small">
                    <lightning-datatable
                        key-field="key"
                        data={topicRows}
                        columns={topicTableColumns}
                        selected-rows={selectedTopicRowKeys}
                        max-row-selection="1"
                        onrowselection={handleTopicRowSelection}
                    ></lightning-datatable>
                </div>
            </section>
        </template>

        <template if:true={isSlideOneMode}>
            <section class="editor-box">
                <div class="editor-header">
                    <p class="step-title">{pageOneLabel}</p>
                    <div class="editor-header-actions">
                        <lightning-button
                            variant="neutral"
                            label={copyButtonLabel}
                            onclick={handleCopyPageOne}
                            disabled={disableCopyPageOne}
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label={saveButtonLabel}
                            onclick={handleSave}
                            disabled={disableSave}
                        ></lightning-button>
                    </div>
                </div>
                <lightning-input
                    class="slds-m-top_small"
                    type="text"
                    label={titleInputLabel}
                    value={pageOneTitle}
                    onchange={handlePageOneTitleChange}
                ></lightning-input>
                <lightning-input-rich-text
                    class="rich-editor slds-m-top_small"
                    value={pageOneRichText}
                    onchange={handlePageOneRichTextChange}
                ></lightning-input-rich-text>
            </section>
        </template>

        <template if:true={isSlideTwoMode}>
            <section class="editor-box">
                <div class="editor-header">
                    <p class="step-title">{pageTwoLabel}</p>
                    <div class="editor-header-actions">
                        <lightning-button
                            variant="neutral"
                            label={copyButtonLabel}
                            onclick={handleCopyPageTwo}
                            disabled={disableCopyPageTwo}
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label={saveButtonLabel}
                            onclick={handleSave}
                            disabled={disableSave}
                        ></lightning-button>
                    </div>
                </div>
                <lightning-input
                    class="slds-m-top_small"
                    type="text"
                    label={titleInputLabel}
                    value={pageTwoTitle}
                    onchange={handlePageTwoTitleChange}
                ></lightning-input>

                <lightning-file-upload
                    class="slds-m-top_small"
                    label={supplierUploadLabel}
                    name="supplierIntroUploadInFlow"
                    accept={supplierFileAccept}
                    record-id={qbrMeetingId}
                    onuploadfinished={handleSupplierUploadFinished}
                    disabled={isBusy}
                ></lightning-file-upload>
                <p class="helper-text slds-m-top_x-small">{supplierUploadHint}</p>

                <lightning-input-rich-text
                    class="rich-editor slds-m-top_small"
                    value={pageTwoRichText}
                    onchange={handlePageTwoRichTextChange}
                ></lightning-input-rich-text>
            </section>
        </template>

                <template if:true={pageFiveHasTable}>

        <template if:true={isBusy}>
            <lightning-spinner class="slds-m-top_small" alternative-text="Processing" size="small"></lightning-spinner>
        </template>

        <template if:false={isSetupMode}>
            <template if:true={statusMessage}>
                <p class="status-message slds-m-top_small">{statusMessage}</p>
            </template>
        </template>

        <template if:true={errorMessage}>
            <p class="error-message slds-m-top_small">{errorMessage}</p>
        </template>
    </div>
