<template>
    <lightning-card title={i18n.cardTitle} icon-name="standard:account">
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <p class="intro">{i18n.intro}</p>

            <section class="panel">
                <div class="status-header">
                    <span class="status-label">{i18n.chooseAccounts}</span>
                    <lightning-badge label={selectionLabel}></lightning-badge>
                </div>

                <lightning-input
                    class="search"
                    type="search"
                    label={i18n.searchLabel}
                    value={searchKey}
                    placeholder={i18n.searchPlaceholder}
                    onchange={handleSearchChange}
                ></lightning-input>

                <template if:true={isSearching}>
                    <lightning-spinner alternative-text={i18n.searchingAccounts} size="small"></lightning-spinner>
                </template>

                <div class="table-wrap">
                    <lightning-datatable
                        key-field="id"
                        data={accounts}
                        columns={columns}
                        onrowselection={handleRowSelection}
                        selected-rows={selectedRows}
                    ></lightning-datatable>
                </div>

                <template if:true={showEmptyState}>
                    <p class="empty-state">{i18n.noMatchingAccounts}</p>
                </template>
            </section>

            <section class="editor-box">
                <span class="status-label">{i18n.rolesToApply}</span>
                <lightning-dual-listbox
                    class="roles-picklist"
                    name="accountRoles"
                    label={i18n.accountRoles}
                    source-label={i18n.availableRoles}
                    selected-label={i18n.selectedRoles}
                    options={roleOptions}
                    value={selectedRoles}
                    onchange={handleRoleChange}
                ></lightning-dual-listbox>

                <p class="hint-text">{i18n.hintText}</p>

                <div class="actions">
                    <lightning-button
                        variant="brand"
                        label={i18n.applyRoles}
                        onclick={handleApplyRoles}
                        disabled={disableApplyButton}
                    ></lightning-button>
                    <lightning-button
                        class="slds-m-left_x-small"
                        label={i18n.clearRoles}
                        onclick={handleClearRoles}
                        disabled={disableClearButton}
                    ></lightning-button>
                </div>
            </section>
        </div>
    </lightning-card>
</template>
