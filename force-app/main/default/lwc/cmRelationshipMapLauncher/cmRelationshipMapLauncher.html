<template>
    <div class="launcher-wrap">
        <button
            class="launcher-chip"
            type="button"
            title={buttonLabel}
            aria-label={buttonLabel}
            onclick={handleOpen}
            disabled={isOpenDisabled}
        >
            <span class="launcher-icon-shell">
                <lightning-icon
                    icon-name="utility:connected_apps"
                    size="x-small"
                    class="launcher-icon"
                ></lightning-icon>
            </span>
            <span class="launcher-title">{cardTitle}</span>
            <lightning-icon
                icon-name="utility:chevronright"
                size="xx-small"
                class="launcher-arrow"
            ></lightning-icon>
        </button>
        <p class="launcher-description">{cardDescription}</p>
    </div>
</template>
