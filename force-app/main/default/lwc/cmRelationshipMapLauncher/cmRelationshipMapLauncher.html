<template>
    <lightning-card>
        <div class="slds-media slds-media_center slds-p-around_medium">
            <div class="slds-media__figure">
                <lightning-icon icon-name="utility:connected_apps" size="large" class="icon-blue"></lightning-icon>
            </div>
            <div class="slds-media__body">
                <h2 class="slds-text-heading_small slds-m-bottom_xx-small">{cardTitle}</h2>
                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">{cardDescription}</p>
                <lightning-button
                    label={buttonLabel}
                    variant="brand"
                    icon-name="utility:new_window"
                    icon-position="right"
                    onclick={handleOpen}
                ></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
