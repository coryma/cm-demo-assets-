<template>
    <template if:true={showBanner}>
        <section class={bannerClass} role="status" aria-live="polite">
            <div class="tag-wrap">
                <lightning-icon
                    icon-name="utility:company"
                    alternative-text={roleAltText}
                    size={iconSize}
                ></lightning-icon>
                <template for:each={roleBadges} for:item="role">
                    <span key={role.key} class={role.className}>{role.label}</span>
                </template>
            </div>
            <div class="content">
                <template if:true={isDetailMode}>
                    <p class="title">{detailTitle}</p>
                </template>
                <p class="message">{mainMessage}</p>
                <template if:true={showMapping}>
                    <p class="mapping">{mappingMessage}</p>
                </template>
                <template if:true={isDetailMode}>
                    <p class="hint">{detailHint}</p>
                </template>
            </div>
        </section>
    </template>
</template>
